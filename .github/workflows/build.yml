name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --no-daemon -x validateSigningRelease

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -type f

      - name: Sign APK with apksigner (v1+v2+v3)
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore.p12
          
          # Convert PKCS12 to JKS for apksigner compatibility
          keytool -importkeystore \
            -srckeystore /tmp/keystore.p12 \
            -srcstoretype PKCS12 \
            -srcstorepass "${{ secrets.STORE_PASSWORD }}" \
            -destkeystore /tmp/keystore.jks \
            -deststoretype JKS \
            -deststorepass "${{ secrets.STORE_PASSWORD }}" \
            -noprompt
          
          # Sign with apksigner (v2 + v3 schemes)
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks /tmp/keystore.jks \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            app/build/outputs/apk/release/app-release.apk

      - name: Verify signature schemes
        run: |
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner verify -v app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          overwrite: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-signed-apk
          path: app/build/outputs/apk/release/
          retention-days: 5
