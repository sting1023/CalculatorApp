name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Decode keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
          echo "keystore decoded"

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Create keystore.properties
        run: |
          cat > app/keystore.properties << 'EOF'
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          storePassword=${{ secrets.STORE_PASSWORD }}
          storeFile=keystore.jks
          storeType=JKS
          EOF
          echo "keystore.properties created"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -type f

      - name: Verify signature
        run: |
          unzip -l app/build/outputs/apk/release/*.apk | grep "META-INF/.*\.RSA" && echo "APK is SIGNED" || echo "WARNING: APK may not be signed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-signed-apk
          path: app/build/outputs/apk/release/
          retention-days: 5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
