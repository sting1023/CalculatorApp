name: Build Signed APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease --no-daemon -x validateSigningRelease

      - name: List build outputs
        run: find app/build/outputs -name "*.apk" -type f

      - name: Sign APK with jarsigner
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > /tmp/keystore.p12
          /opt/java/openjdk/bin/jarsigner \
            -keystore /tmp/keystore.p12 \
            -storetype PKCS12 \
            -storepass "${{ secrets.STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app/build/outputs/apk/release/app-release.apk \
            "${{ secrets.KEY_ALIAS }}"

      - name: Verify signature
        run: |
          unzip -l app/build/outputs/apk/release/app-release.apk | grep "META-INF/.*\.RSA" && echo "APK is SIGNED" || echo "WARNING: APK may not be signed"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-signed-apk
          path: app/build/outputs/apk/release/
          retention-days: 5
